# Local infra for the flash-sale ticketing saga platform.
# Brings up: Kafka (KRaft, no ZooKeeper), 4x Postgres (db-per-service),
# Redis, schema registry, and the observability stack (OTel + Prometheus + Grafana).
# Service apps are NOT here yet — added once their modules exist.

name: ticketing

services:
  # ---- Kafka (official Apache image, KRaft mode, no ZooKeeper) ----
  # NOTE: switched off bitnami/kafka — Bitnami removed its free Docker Hub
  # tags in late 2025 (moved to the paid 'bitnamisecure' / 'bitnamilegacy').
  # The official apache/kafka image uses raw env vars named KAFKA_* (the
  # server.properties keys), NOT bitnami's KAFKA_CFG_* convention.
  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"   # external listener for host apps
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Single-broker: internal topics must use RF=1 or they can't be created
      # (defaults are 3). Without this, __consumer_offsets never forms and ALL
      # consumer groups hang on FIND_COORDINATOR — no group consumer gets data.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"   # persisted on the named volume below
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      # CLI tools live at /opt/kafka/bin and are on PATH in the apache image.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9094 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---- Kafka UI (browse topics, messages, consumer-group lag) ----
  # Optional/dev tool. Start with `make kafka-ui`. Connects to the broker on the
  # in-network listener kafka:9094. Web UI on http://localhost:8085.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ticketing
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ---- Kafka exporter (consumer-group lag as Prometheus metrics) ----
  #
  # Lag is THE health metric for an event-driven system. It answers the only
  # question that matters when the saga feels slow: are consumers keeping up with
  # producers, or falling behind? Latency and error rate can both look perfect
  # while a consumer group silently drifts hours behind — the system isn't
  # broken, it's just late, and every alert stays green.
  #
  # lag = log-end-offset (last message produced) - committed offset (last
  # message the group finished). Growing lag = arrival rate > processing rate.
  #
  # Why a separate exporter instead of app metrics: lag is a property of the
  # GROUP as seen by the broker, not of any one consumer process. A crashed or
  # descheduled consumer reports nothing at all — and that's exactly when its lag
  # matters most. The exporter asks the broker, so it still sees the group when
  # every member is gone.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command: ["--kafka.server=kafka:9094"]
    ports:
      - "9308:9308"   # /metrics
    depends_on:
      kafka:
        condition: service_healthy

  # ---- Schema registry (free, non-Confluent) ----
  schema-registry:
    image: apicurio/apicurio-registry-mem:2.5.11.Final
    ports:
      # 8086, NOT 8081 — order-service owns 8081 (host runs and the `apps`
      # profile both bind it). This collided silently until the services were
      # containerised, because the registry is rarely started.
      - "8086:8080"
    depends_on:
      kafka:
        condition: service_healthy

  # ---- Postgres: one per service (database-per-service) ----
  postgres-order:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order
      POSTGRES_PASSWORD: changeme
    volumes:
      - pg-order:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:16
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: changeme
    volumes:
      - pg-inventory:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16
    ports: ["5434:5432"]
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: changeme
    volumes:
      - pg-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16
    ports: ["5435:5432"]
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: changeme
    volumes:
      - pg-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (cache-aside + distributed lock) ----
  redis:
    image: redis:7
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Observability ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - prometheus
      - jaeger

  # Trace STORAGE + UI. The collector receives spans and forwards them here;
  # http://localhost:16686 is where you actually look at a saga end to end.
  # all-in-one keeps traces in memory only — restart wipes them. Fine locally,
  # and a useful reminder that traces are sampled telemetry, not a source of truth.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"   # accept OTLP from the collector on 4317/4318
    ports:
      - "16686:16686"   # Jaeger UI
      # 4317/4318 deliberately NOT published: the OTel collector already owns those
      # host ports. Services -> collector -> jaeger, all over the compose network.

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on:
      - prometheus

  # ---- The four services, containerised ------------------------------------
  #
  # All under the `apps` profile, so they do NOT start with `docker compose up`.
  # Default dev loop stays: infra in Docker, services on the host via `make run-*`
  # (fast restarts, debugger attach, no image rebuild per edit). Start these with
  # `make up-apps` when you want the whole system self-contained — no host JDK.
  #
  # Config differences from running on the host, all via env:
  #   - Kafka is kafka:9094 (in-network listener), not localhost:9092
  #   - Postgres is the container name + internal port 5432, not localhost:543x
  #   - OTLP goes to otel-collector:4318, not localhost:4318
  # The application.yml defaults cover the host case; these override for compose.

  order-service:
    profiles: ["apps"]
    build:
      context: .
      args:
        SERVICE: order-service
    ports: ["8081:8080"]
    environment:
      SERVER_PORT: "8080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      ORDER_DB_URL: jdbc:postgresql://postgres-order:5432/order_db
      ORDER_DB_USER: order
      ORDER_DB_PASSWORD: changeme
      OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      # The invariant checker calls the other services; in-network names here.
      SERVICES_INVENTORY_BASE_URL: http://inventory-service:8080
      SERVICES_PAYMENT_BASE_URL: http://payment-service:8080
    depends_on:
      kafka: {condition: service_healthy}
      postgres-order: {condition: service_healthy}

  inventory-service:
    profiles: ["apps"]
    build:
      context: .
      args:
        SERVICE: inventory-service
    ports: ["8082:8080"]
    environment:
      SERVER_PORT: "8080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      INVENTORY_DB_URL: jdbc:postgresql://postgres-inventory:5432/inventory_db
      INVENTORY_DB_USER: inventory
      INVENTORY_DB_PASSWORD: changeme
      REDIS_URL: redis://redis:6379
      OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      kafka: {condition: service_healthy}
      postgres-inventory: {condition: service_healthy}
      redis: {condition: service_started}

  payment-service:
    profiles: ["apps"]
    build:
      context: .
      args:
        SERVICE: payment-service
    ports: ["8083:8080"]
    environment:
      SERVER_PORT: "8080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      PAYMENT_DB_URL: jdbc:postgresql://postgres-payment:5432/payment_db
      PAYMENT_DB_USER: payment
      PAYMENT_DB_PASSWORD: changeme
      OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      kafka: {condition: service_healthy}
      postgres-payment: {condition: service_healthy}

  notification-service:
    profiles: ["apps"]
    build:
      context: .
      args:
        SERVICE: notification-service
    ports: ["8084:8080"]
    environment:
      SERVER_PORT: "8080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      NOTIFICATION_DB_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      NOTIFICATION_DB_USER: notification
      NOTIFICATION_DB_PASSWORD: changeme
      OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      kafka: {condition: service_healthy}
      postgres-notification: {condition: service_healthy}

volumes:
  kafka-data:
  pg-order:
  pg-inventory:
  pg-payment:
  pg-notification:
  redis-data:
  grafana-data:
