# Prometheus scrape config. Service jobs added as each service exposes /actuator/prometheus.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OTel collector's own metrics + anything it exports via Prometheus exporter.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

