# OpenTelemetry Collector config.
# Receives OTLP from services, exports traces to logging (swap for Tempo/Jaeger later)
# and exposes metrics for Prometheus to scrape.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Prometheus scrapes this endpoint (see prometheus.yml otel-collector job).
  prometheus:
    endpoint: 0.0.0.0:8889
  # Traces to stdout for now; replace with Tempo/Jaeger exporter when added.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
