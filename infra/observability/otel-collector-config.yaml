# OpenTelemetry Collector config.
# Receives OTLP from services, exports traces to logging (swap for Tempo/Jaeger later)
# and exposes metrics for Prometheus to scrape.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Prometheus scrapes this endpoint (see prometheus.yml otel-collector job).
  prometheus:
    endpoint: 0.0.0.0:8889
  # Traces -> Jaeger (UI on http://localhost:16686). Jaeger speaks OTLP natively
  # since 1.35, so no jaeger-specific exporter is needed — plain OTLP/gRPC.
  # `jaeger` is the compose service name; TLS off because it's a local network.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Also dump spans to collector stdout — handy when Jaeger shows nothing and you
  # need to know whether the problem is "spans never arrived" or "UI query wrong".
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
