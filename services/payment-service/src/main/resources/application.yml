# payment-service config.
spring:
  application:
    name: payment-service

  # --- Postgres (payment_db on :5434). ---
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5434/payment_db}
    username: ${PAYMENT_DB_USER:payment}
    password: ${PAYMENT_DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    listener:
      ack-mode: record
      observation-enabled: true            # consume side: extract `traceparent` from record headers
    template:
      observation-enabled: true            # produce side: inject `traceparent` into record headers

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        # circuitbreakers = live state (CLOSED/OPEN/HALF_OPEN); events = recent transitions.
        include: health,info,prometheus,circuitbreakers,circuitbreakerevents
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0                     # sample everything locally; see order-service for why
  otlp:
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      show-details: always   # so /actuator/health surfaces the breaker's state too
  health:
    circuitbreakers:
      enabled: true

outbox:
  relay:
    poll-ms: 1000
    batch-size: 100

# Payment decision rule (placeholder for real gateway): decline any charge whose
# amount is strictly greater than this. Default high so normal orders authorize;
# order something pricey to exercise the decline → compensation path.
payment:
  decline-above: 1000.00
  # Simulated payment gateway (see PaymentGatewayClient). latency-ms just makes the
  # call take realistic time; the fail switch is flipped at runtime via /api/chaos/gateway.
  gateway:
    latency-ms: 50

# --- Resilience4j: circuit breaker + retry around the gateway call ---
resilience4j:
  circuitbreaker:
    instances:
      paymentGateway:
        # Count-based window of the last N calls. Once >= failure-rate-threshold percent
        # of them failed (and at least minimum-number-of-calls have been recorded), trip OPEN.
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50           # % of failures in the window that trips the breaker
        wait-duration-in-open-state: 10s     # stay OPEN this long, then probe (HALF_OPEN)
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # GatewayException = a real gateway failure → counts toward the failure rate.
        record-exceptions:
          - com.ticketing.payment.gateway.GatewayException
  retry:
    instances:
      paymentGateway:
        max-attempts: 3            # 1 try + 2 retries
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.ticketing.payment.gateway.GatewayException
        # Do NOT retry a breaker that's already OPEN — fast-fail straight to the decline
        # instead of wasting 3 attempts on a call the breaker will reject anyway.
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
