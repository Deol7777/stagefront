# order-service config.
spring:
  application:
    name: order-service

  # --- Postgres (order_db). Defaults match docker-compose; override via env/.env. ---
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${ORDER_DB_USER:order}
    password: ${ORDER_DB_PASSWORD:changeme}

  jpa:
    hibernate:
      # validate (not update/create): Flyway owns the schema; Hibernate only
      # checks the entities match the migrated tables. Catches drift early.
      ddl-auto: validate
    open-in-view: false      # no lazy-loading outside the service layer
    properties:
      hibernate:
        format_sql: true
    show-sql: false          # flip to true to watch SQL while learning

  # Flyway runs db/migration/V*.sql on startup, before the app serves traffic.
  flyway:
    enabled: true

  # --- Kafka: the outbox relay produces; saga listeners consume. ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # We store the event already-serialized as a JSON string in the outbox,
      # so the relay just sends strings. Key = partition key (orderId).
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all            # wait for all in-sync replicas — don't lose a published event
      properties:
        enable.idempotence: true   # broker dedups producer retries (no dup from retry)
    consumer:
      group-id: order-service       # saga listeners (payment outcomes, reservation failures)
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
      # Wrap each listener invocation in a Micrometer Observation. On the consume
      # side this EXTRACTS the W3C `traceparent` header off the record and makes
      # the listener's work a child of the span that produced it. Off by default.
      observation-enabled: true
    template:
      # Same idea on the produce side: every KafkaTemplate.send() becomes a span
      # and INJECTS `traceparent` into the record headers. Producer injects,
      # consumer extracts — that pair is the entire cross-service trace mechanism.
      observation-enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      # Stamp every metric with the service name, so one Prometheus instance
      # scraping all four services can still tell their series apart.
      application: ${spring.application.name}
  tracing:
    sampling:
      # 1.0 = record EVERY trace. Correct for local learning (you want to find the
      # one order you just placed). In production this is where you'd drop to ~0.01
      # and rely on tail sampling, because full sampling is expensive at volume.
      probability: 1.0
  otlp:
    tracing:
      # Where finished spans get shipped. The OTel collector (docker-compose)
      # listens on 4318 for OTLP/HTTP; it forwards traces to Jaeger for viewing.
      # Services run on the HOST via `make run-*`, so localhost is correct here.
      endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

# How often the outbox relay polls for unpublished rows (ms).
outbox:
  relay:
    poll-ms: 1000
    batch-size: 100
